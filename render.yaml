databases:
  - name: todolist-db
    databaseName: todolist
    user: todolist_user
    plan: free

services:
  - type: web
    name: todolist-web
    env: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todolist-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
